<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Generátor náhodných slov</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: "Courier New", monospace;
      color: #00ff88;
      overflow: hidden;
    }

    /* pohyblivé digitálne pozadie */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,255,136,0.05),
        rgba(0,255,136,0.05) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 0;
      animation: movebg 5s linear infinite;
    }

    @keyframes movebg {
      0% { background-position: 0 0; }
      100% { background-position: 0 100%; }
    }

    .container {
      border: 2px solid #00ff88;
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0 0 30px #00ff88;
      max-width: 700px;
      width: 90%;
      background: rgba(0, 0, 0, 0.95);
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 44px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ff88;
    }

    h2 {
      font-size: 22px;
      font-weight: normal;
      color: #00cc66;
      margin-bottom: 30px;
    }

    button {
      font-size: 20px;
      padding: 15px 35px;
      border: 2px solid #00ff88;
      border-radius: 8px;
      cursor: pointer;
      background: black;
      color: #00ff88;
      transition: 0.2s;
      font-family: "Courier New", monospace;
    }

    button:hover {
      background: #001a0d;
      box-shadow: 0 0 20px #00ff88;
    }

    .terminal {
      margin-top: 30px;
      height: 140px;
      border: 2px solid #00ff88;
      border-radius: 10px;
      position: relative;
      background: #001a0d;
      overflow: hidden;
      padding: 10px;
      box-shadow: 0 0 20px #00ff88 inset;
    }

    #output {
      position: absolute;
      top: 10px;
      left: 15px;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px #00ff88;
    }

    .dots {
      font-size: 28px;
      letter-spacing: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }

    /* kurzor efekt */
    #cursor {
      display: inline-block;
      width: 12px;
      height: 28px;
      background: #00ff88;
      margin-left: 5px;
      animation: blinkcursor 0.7s infinite;
      vertical-align: bottom;
    }

    @keyframes blinkcursor {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GENERÁTOR NÁHODNÝCH SLOV</h1>
    <h2>(Andrej Danko)</h2>

    <button onclick="generateWord()">GENEROVAŤ</button>

    <div class="terminal">
      <div id="output"></div>
    </div>
  </div>

  <script>
    const words = [
      "chským",
      "zdeformovaně",
      "konsolidovateľnosť",
      "progresívnismus",
      "špecifickosť",
      "transparantnosť",
      "legislatýva",
      "demogracia",
      "komunikatývnosť",
      "ekonomýka",
      "stabilizýcia",
      "problématikačný",
      "kompenzačňák",
      "realizátor",
      "transparančo",
      "implementejšn",
      "medzinárodňák",
      "parlamentárna debatka",
      "stabilitka",
      "konzulťák",
      "legislatívček"
    ];

    let lastTwo = []; // pamätá posledné dve slová

    function generateWord() {
      const output = document.getElementById("output");
      
      // zobraz bodky a kurzor
      output.innerHTML = '<span class="dots">...</span><span id="cursor"></span>';

      setTimeout(() => {
        let filteredWords = words.filter(w => !lastTwo.includes(w));
        const randomIndex = Math.floor(Math.random() * filteredWords.length);
        const selected = filteredWords[randomIndex];

        // aktualizuj posledné dve slová
        lastTwo.push(selected);
        if (lastTwo.length > 2) lastTwo.shift();

        output.textContent = selected;
      }, 2000);
    }
  </script>
</body>
</html>
